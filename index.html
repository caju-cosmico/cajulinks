<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Ícone -->
  <link rel="icon" href="imgs/house-chimney.svg" type="image/svg+xml" />

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />

  <!-- Script -->
  <script defer src="script.js"></script>

  <title>CajuLinks</title>
</head>

<body>

  <!-- Conteúdo principal -->
  <main class="main">

    <!-- Perfil -->
    <img src="./imgs/perfil_rosto.png" alt="Foto de Alessandro" class="perfil" />
    <h1 class="title">Alessandro Belo</h1>
    <p class="subtitle">Designer Gráfico</p>

    <!-- Links -->
    <section class="link-container">

      <!-- Link item -->
      <article class="splitButton" data-link="https://wa.me/5562985323464">
        <button class="txt-button">
          <img src="./imgs/whatsapp.svg" class="text-icon" alt="" />
          <span>Whatsapp</span>
        </button>

        <button class="share-btn" aria-label="Compartilhar link do WhatsApp">
          <img src="./imgs/share-square.svg" class="link-icon" alt="" />
        </button>
      </article>

      <article class="splitButton" data-link="https://www.behance.net/cajucosmico">
        <button class="txt-button">
          <img src="./imgs/behance.svg" class="text-icon" alt="" />
          <span>Behance</span>
        </button>

        <button class="share-btn" aria-label="Compartilhar link do Behance">
          <img src="./imgs/share-square.svg" class="link-icon" alt="" />
        </button>
      </article>

      <article class="splitButton" data-link="https://www.instagram.com/caju.cosmico.design/">
        <button class="txt-button">
          <img src="./imgs/instagram.svg" class="text-icon" alt="" />
          <span>Instagram</span>
        </button>

        <button class="share-btn" aria-label="Compartilhar link do Instagram">
          <img src="./imgs/share-square.svg" class="link-icon" alt="" />
        </button>
      </article>

    </section>
  </main>

  <!-- Rodapé -->
  <footer class="footer">
    <img src="./imgs/logo.svg" class="logo" alt="Logo Caju" />
  </footer>

</body>
</html>
